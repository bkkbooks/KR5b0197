front:
  text: 玉籙資度午朝儀
  hash: sha256:977a640e910dcd723b2bb75047a26bf6fcd5317d38b50e0af0cf8abd6438a95e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0197_HFL_000-001a, image: hfl/0268/0268-060.png}
body:
  text: 法事如式各禮師存念如法請宣神呪丹靈朱火炎霞激風赤輪剛運天光八衝迸威包羅交變萬方流金豁落羣魔滅蹤辟奸破妖明耀元功金符召制躡雲䇿龍謡歌慶㑹散花太空神化宜運四極安隆伏御帝前罔有不恭鳴法鼓二十四通無上三天玄元始三氣太上道君太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝顯服冠帶垂纓關啓玄壇土地方域神真臣今午朝升壇行道謹奏為入意其諸忱悃巳録告聞願得太上十方至真道氣靈寶慧光下降流入臣等身中令臣所啓之誠速逹徑御太上無極大道三清上聖昊天金闕玉皇上帝東極慈尊青玄上帝御前請稱法位具位臣姓某與臨壇官衆等謹同誠上啓虛無自然無極大道元始天尊太上道君太上老君高上玉皇上帝紫微北極大帝紫微天皇大帝后土皇地祇東極青華大帝南極長生大帝無上玉帝玉虛上帝東華南極西靈北真玄都玉京金闕七寶瓊臺紫微上宮靈寶至真明皇道君十方巳得道大聖衆至真諸君丈人大慈大悲救苦真人救度真人大惠真人注生真人普救真人香林㑹中法解真人三十六部尊經玄中大法師三天大法師靈寶經籍度三師真君正一嗣系女三師真君三界官屬一切真靈臣聞萬真環拱凝聖日於妙嚴三極皈依扇仁風於長樂慧光映虹霓之象威芒射劒戟之容名耀垂慈開地禁而招地魄號尊救苦將天氣以制天魂一切之結習氷消十方之威神風動巍巍玄運赫赫巖瞻臣等身佩瑶圖心縈瓊檢煙霞獨嘯合凝二氣以鶯遷日月同流乃混萬塵而蚊負切切惜分之志依依進寸之心蹈過履非幸逭丹青之威令承符宣德誓彰金石之真忱君命所臨理宜關奏欽奉綸音崇修玉籙資薦某靈進位天階升真仙品按如詞旨備切精誠爰皈命於青華冀登名於紫籍瑶臺雲斂羅玉籙之真階琅闕天開拱虛皇之寶御禁路簇龍華之仗睿衢傳鳯蹕之音碧霧彌羅奏鈞天於芝陛翠霞縹眇飛寶篆於蘭篝鴛行穆穆以朝班蟻悃勤勤而奏對願敷陽綍為闢隂塵俾萬類以霑恩使十華而均慶以今午朝升壇行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至真道寶臣等皈身皈神皈命首體投地仰依大上三尊十方衆聖願以是香功德端薦某靈伏願玉京侍聖瑶闕凝真氣入玄玄䕃麟符而延周曆神超渺渺茂鳯紀以衍堯宗今故燒香自皈依師尊大聖衆至真之德得道之後保天長存和與道合真以今午朝升壇行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至真經寶臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德資薦某靈上請上清黃籙院三佐真君請授籙符依科證道伏願青華定籙永遊宴於福鄉朱陵登真常逍遙於道境今故燒香自皈依師尊大聖衆至真之德得道之後升入無形和與道合真以今午朝升壇行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至真師寶臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德上請度人不死之神南極長生之君度世司馬大神好生韓君丈人南上司命司録延夀益算度厄尊神南上九華真人十方飛天神王同遵符命升送某靈上登天位恭願降日月之真精㑹隂陽之梵氣精神魂魄意聚五氣以朝元玄牝天地根結一珠而成象證真天府遊宴玉京澤被人天恩覃家國今故燒香自皈依師尊大聖衆至真之德得道之後永保長存和與道合真唱方懴方命魔三啓三禮重稱法位具位臣姓某與臨壇官衆等謹重誠上啓三清三境天尊十極十華上聖三界官屬玄壇應感一切真靈臣聞碧落流精洞焕緑羅之界青霄御氣輝煌蒼藹之墟示法身而數若沙塵衍聖言而明符日月凡伸皈命必沐留神以今欽奉綸音崇修玉籙祗薦某靈玉蕳升神諒齊功之罔極金符度命信妙果之無窮恭願某靈祖氣澄清性天瑩徹高步華林之境妙登碧落之庭上願三景高明五靈協順風雲藏斂草木輝華魚躍鳶飛遂生成於禹迹鳯儀獸舞陶化育於虞延三農遊夏屋以歡娛四鄙登春臺而樂意顯幽遂慶宗社隆安則上明天尊大慈之化下副臣等皈命之誠謹啓以聞發願存神燒香香宫使者左右龍虎君侍香諸靈官當令臣向來午朝升壇行道之所自然生金液丹碧之英百靈衆真交㑹在此香火爐前當願誠意感通某靈升度克證神仙之果普資家國之恩十方仙童玉女接侍蘭煙傳臣向來所啓之誠速逹徑御至真無極大道三清上聖昊天金闕玉皇上帝東極慈尊青玄上帝道前出堂頌玉籙資度午朝儀
